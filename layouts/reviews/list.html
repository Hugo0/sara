{{ define "main" }}

{{ partial "breadcrumbs.html" . }}

<div class="single-intro-container">
  <h1 class="single-title">{{ .Title }}</h1>
</div>

<div class="list-container">
  {{ range .Sections }}
  <details open>
    <summary class="reviews-section-title">{{ .Title }}</summary>
    <div class="reviews-section-pages">
      {{ range .Pages }}
      {{ partial "post-entry.html" . }}
      {{ end }}
    </div>
  </details>
  {{ end }}
</div>

{{ end }}
